<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Wheel - 9nau9</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: manipulation;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #FFD700;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app-wrapper {
            width: 95%;
            max-width: 400px;
            height: 95%;
            border: 3px solid #FFD700;
            border-radius: 10px;
            background-color: #111;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            overflow: hidden;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 40px;
            color: #fff;
            z-index: 5;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
        }

        /* Arayüz Ekranları */
        .ui-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            padding: 20px;
        }
        .title {
            font-size: 48px;
            color: #FFD700;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .action-button {
            background-color: #FFD700;
            color: #000;
            border: none;
            font-family: 'VT323', monospace;
            font-size: 28px;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #b39700;
            margin-top: 20px;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .action-button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #b39700;
        }
    </style>
</head>
<body>
    <div class="app-wrapper" id="gameWrapper">
        <div id="scoreDisplay">0</div>
        <canvas id="gameCanvas"></canvas>
        
        <!-- Başlangıç Ekranı -->
        <div class="ui-screen" id="startScreen">
            <p style="font-family: 'Arial', sans-serif; font-size: 14px; color: #ccc; line-height: 1.5; margin-bottom: 20px;">
                Tap anywhere to shoot the ball.<br>
                Match the color on the spinning wheel.<br>
                <span style="color:#FF3B30;">WARNING: The wheel has a mind of its own.</span>
            </p>
            <button class="action-button" onclick="startGame()">START</button>
        </div>

        <!-- Bitiş Ekranı -->
        <div class="ui-screen" id="endScreen" style="display: none;">
            <div class="title" style="color: #FF3B30;">COLOR BLIND</div>
            <div style="font-size: 28px; color: #4CD964; margin-bottom: 20px;" id="finalScore">SCORE: 0</div>
            <button class="action-button" onclick="startGame()">RETRY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('gameWrapper');
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const scoreDisplay = document.getElementById('scoreDisplay'); // Doğru tanım burada
        const finalScore = document.getElementById('finalScore');

        // Renk Paleti (9nau9 Retro Renkleri)
        const colors = ['#FF3B30', '#4CD964', '#007AFF', '#FFD700', '#AF52DE','#D7F7E1'];
        
        // Oyun Değişkenleri
        let score = 0;
        let gameLoop;
        let isGameOver = false;
        let frames = 0;
        let particles = [];

        // Çark (Wheel)
        let wheel = {
            x: 0,
            y: 0,
            radius: 80,
            innerRadius: 50,
            angle: 0,
            baseSpeed: 0.03,
            currentSpeed: 0.03,
            targetSpeed: 0.03,
            direction: 1
        };

        // Top (Projectile)
        let ball = {
            x: 0,
            y: 0,
            radius: 12,
            color: '',
            isFired: false,
            speed: 15
        };

        // --- SES MOTORU ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'shoot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        // Boyutlandırma
        function resize() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            wheel.x = canvas.width / 2;
            wheel.y = canvas.height * 0.35;
            if (!ball.isFired) resetBall();
        }
        window.addEventListener('resize', resize);

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 60;
            ball.isFired = false;
            ball.color = colors[Math.floor(Math.random() * colors.length)];
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function updateParticles() {
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
        }

        function drawParticles() {
            for (let p of particles) {
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        function drawWheel() {
            const segmentAngle = (Math.PI * 2) / colors.length;
            
            for (let i = 0; i < colors.length; i++) {
                ctx.beginPath();
                ctx.moveTo(wheel.x, wheel.y);
                ctx.arc(wheel.x, wheel.y, wheel.radius, wheel.angle + i * segmentAngle, wheel.angle + (i + 1) * segmentAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = '#050505';
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(wheel.x, wheel.y, wheel.innerRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0a0a';
            ctx.fill();
            ctx.stroke();
        }

        function drawBall() {
            if (particles.length > 0 && !ball.isFired) return;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.fillRect(ball.x + 2, ball.y - 6, 4, 4);
        }

        function checkCollision() {
            if (ball.y - ball.radius <= wheel.y + wheel.radius) {
                let hitAngle = (Math.PI / 2 - wheel.angle) % (Math.PI * 2);
                if (hitAngle < 0) hitAngle += Math.PI * 2;
                
                const segmentAngle = (Math.PI * 2) / colors.length;
                let hitIndex = Math.floor(hitAngle / segmentAngle);
                
                let hitColor = colors[hitIndex];

                if (hitColor === ball.color) {
                    playSound('pop');
                    createParticles(ball.x, ball.y, ball.color);
                    score++;
                    scoreDisplay.innerText = score; // Hata düzeltildi
                    
                    if (score % 5 === 0) {
                        wheel.baseSpeed += 0.005;
                    }
                    
                    resetBall();
                } else {
                    gameOver();
                }
            }
        }

        function updateWheel() {
            if (frames % 120 === 0 && frames > 0) {
                let rand = Math.random();
                if (rand < 0.3) {
                    wheel.direction *= -1;
                    wheel.targetSpeed = wheel.baseSpeed * wheel.direction;
                } else if (rand < 0.6) {
                    wheel.targetSpeed = wheel.baseSpeed * 3 * wheel.direction;
                } else {
                    wheel.targetSpeed = wheel.baseSpeed * wheel.direction;
                }
            }

            wheel.currentSpeed += (wheel.targetSpeed - wheel.currentSpeed) * 0.05;
            wheel.angle += wheel.currentSpeed;
        }

        function update() {
            if (isGameOver) return;
            
            updateWheel();
            updateParticles();

            if (ball.isFired) {
                ball.y -= ball.speed;
                checkCollision();
            }

            frames++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawWheel();
            drawParticles();
            drawBall();
        }

        function loop() {
            update();
            draw();
            if (!isGameOver) {
                gameLoop = requestAnimationFrame(loop);
            }
        }

        wrapper.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            if (isGameOver) return;
            
            if (!ball.isFired && particles.length === 0) {
                ball.isFired = true;
                playSound('shoot');
            }
        });

        function startGame() {
            resize();
            score = 0;
            frames = 0;
            wheel.angle = 0;
            wheel.baseSpeed = 0.03;
            wheel.currentSpeed = 0.03;
            wheel.targetSpeed = 0.03;
            wheel.direction = 1;
            particles = [];
            isGameOver = false;
            
            scoreDisplay.innerText = score; // Hata düzeltildi
            scoreDisplay.style.display = 'block'; // Hata düzeltildi
            startScreen.style.display = 'none';
            endScreen.style.display = 'none';
            
            resetBall();
            
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            loop();
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(gameLoop);
            playSound('crash');
            
            scoreDisplay.style.display = 'none'; // Hata düzeltildi
            endScreen.style.display = 'flex';
            finalScore.innerText = `SCORE: ${score}`;
        }
        
        resize();
    </script>
</body>
</html>
