<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Break</title>
    <style>
        body { 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        .banner-wrapper { 
           
           
            transform-origin: center center; 
        }
    </style>
</head>
<body>
    <div class="banner-wrapper">
        
        <!-- YENİ RASTGELE VİDEO OYNATICISI BURAYA EKLENDİ -->
        <iframe id="rastgeleVideoPlayer" width="640" height="360" src="" frameborder="0" allow="autoplay" allowfullscreen></iframe>
        
        <!-- VİDEOYU SEÇEN VE ÇALIŞTIRAN KOD BURAYA EKLENDİ -->
        <script>
            // 1. Google Drive video ID'lerini buraya ekleyeceksin
            const videoIDleri = [
                "1QyPXj3ukcQhJVeCB0TeaXhOJGIEQNaqX",
                "1QyPXj3ukcQhJVeCB0TeaXhOJGIEQNaqX",
                "1QyPXj3ukcQhJVeCB0TeaXhOJGIEQNaqX"
                // 30'a kadar bu şekilde virgülle ayırarak aşağı doğru uzatabilirsin.
            ];

            // 2. Rastgele bir ID seç
            const rastgeleSayi = Math.floor(Math.random() * videoIDleri.length);
            const secilenVideoID = videoIDleri[rastgeleSayi];

            // 3. Seçilen ID'yi Google Drive linki ile birleştir ve otomatik oynatması için autoplay=1 ekle
            const videoLinki = "https://drive.google.com/file/d/" + secilenVideoID + "/preview?autoplay=1";
            
            // 4. iframe'in kaynağını güncelle
            document.getElementById("rastgeleVideoPlayer").src = videoLinki;
        </script>

    </div>
</body>
</html>
