<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Break</title>
    <style>
        /* Ekrandaki tüm boşlukları sıfırlıyoruz */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* Kaydırma çubuklarını gizler */
        }
        
        /* İframe'in ekranın/bulunduğu alanın %100'ünü TIKA BASA doldurmasını sağlıyoruz */
        #rastgeleVideoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    
    <iframe id="rastgeleVideoPlayer" src="" allow="autoplay" allowfullscreen></iframe>
    
    <script>
        // 1. Videolarının SADECE ID'lerini buraya gir.
        const videoIDleri = [
            "1QyPXj3ukcQhJVeCB0TeaXhOJGIEQNaqX", // Senin ilk videon
            "1QyPXj3ukcQhJVeCB0TeaXhOJGIEQNaqX",
            "1QyPXj3ukcQhJVeCB0TeaXhOJGIEQNaqX"
        ];

        // 2. Rastgele bir ID seç
        const rastgeleSayi = Math.floor(Math.random() * videoIDleri.length);
        const secilenVideoID = videoIDleri[rastgeleSayi];

        // 3. Drive Önizleme linki ile birleştir
        const videoLinki = "https://drive.google.com/file/d/" + secilenVideoID + "/preview";
        
        // 4. İframe'in kaynağına bu linki ver
        document.getElementById("rastgeleVideoPlayer").src = videoLinki;
    </script>
</body>
</html>
