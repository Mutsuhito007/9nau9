<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Video</title>
    <style>
        /* Arka planı siyah yapıp boşlukları sıfırlıyoruz */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
        }
        
        /* YouTube videosunu tam merkeze ve ekrana yayacak ayar */
        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* YouTube iframe'i ekranın %100'ünü kaplasın */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
<iframe width="873" height="491" src="https://www.youtube.com/embed/aNde0CTeq00" title="You are not independent. Your chain is long ! #videoart  #free #tearitoff #" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
