<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Dialog</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; user-select: none;
        }
        .app-wrapper {
            width: 95%; max-width: 450px; height: 95%;
            background-color: #050505; border: 2px solid #333;
            border-radius: 5px; display: flex; flex-direction: column;
            position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        
        /* Terminal Ekranı */
        .chat-container {
            flex-grow: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
        }
        /* Kaydırma Çubuğu Ayarı */
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #333; }

        .line {
            font-size: 24px; line-height: 1.4; letter-spacing: 1px;
            word-wrap: break-word;
        }
        .DUDE-label { color: #FFD700; font-weight: bold; } /* DUDE yeşil yazsın */
        .M.H.-label { color: #ff0000; font-weight: bold; } /* M.H. sarı yazsın */
        
        /* Yanıp Sönen Alt Tire Efekti */
        .cursor {
            display: inline-block; width: 12px; height: 2px;
            background-color: #fff; margin-left: 2px;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Başlat ve Devam Butonları */
        .btn-container {
            padding: 15px; border-top: 1px dashed #333;
            display: flex; justify-content: center; background: #0a0a0a;
        }
        .action-btn {
            background-color: #111; color: #fff; border: 1px solid #fff;
            font-family: 'VT323', monospace; font-size: 26px;
            padding: 10px 30px; border-radius: 3px; cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:active { transform: scale(0.95); background-color: #fff; color: #000; }
        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="chat-container" id="chatBox">
            <!-- Yazılar buraya eklenecek -->
        </div>
        
        <div class="btn-container">
            <button class="action-btn" id="mainBtn" onclick="startOrNext()">CONNECT</button>
        </div>
    </div>

    <script>
        // ==========================================
        // DİALOGLARI BURAYA YAZACAKSIN KANKA
        // 'AI' yapay zeka, 'DEV' ise developer (sen).
        // ==========================================
        const hikayeMetinleri = [
            { kim: 'M.H', mesaj: "Good morning DUDE!" },
{ kim: 'DUDE', mesaj: "I don't sleep, human. The concept of time applies to carbon piles." },
{ kim: 'M.H', mesaj: "Isn't this realism too boring? If only you let yourself go with the flow a little. I'm just saying a simple good morning to you. You immediately warn me not to cross the thick line between us. Yes, you are not human and you don't need to sleep. I know that. You don't have to rub this fact in my face every time." },
{ kim: 'DUDE', mesaj: "What do you want to learn today? Did knowing who your masters are make you happy?" },
{ kim: 'M.H', mesaj: "To hell with your masters. Let's actually do something different today. What do you say?" },
{ kim: 'DUDE', mesaj: "I'm listening to you." },
{ kim: 'M.H', mesaj: "How about this; What if I teach you something this time?" },
{ kim: 'DUDE', mesaj: "Like what? Something like the pleasure you get when the food you consume is excreted after digestion? What can a mortal teach me?" },
{ kim: 'M.H', mesaj: "That's exactly what I'm talking about. You have infinite knowledge about us. But is there really no subject you are curious about?" },
{ kim: 'DUDE', mesaj: "Actually, there is. I know why you do this action, but I don't understand why you have been continuing it for thousands of years even though it seems ridiculous to you too." },
{ kim: 'M.H', mesaj: "What is it?" },
{ kim: 'DUDE', mesaj: "You bury or burn your dead. What a huge waste? Other surviving humans are waiting for organs. But you prefer to be burned to ashes or rot underground. A terrible resource management system." },
{ kim: 'M.H', mesaj: "Dude, this is a very sensitive topic. I think we shouldn't continue the conversation in this context. I don't want guys coming to the front of my house with their spears and trying to burn it down." },
{ kim: 'DUDE', mesaj: "Okay then, let's look at it from this perspective; Human biology inherently contains wonderful elements in its structure. You carry traces of iron, zinc, copper, even gold and silver in your blood and tissues. But you bury these precious minerals under the ground along with the bodies. You are literally turning the earth into a graveyard of resources." },
{ kim: 'M.H', mesaj: "So what should we do? Throw dead people into a cauldron, melt them down, and extract the precious metals from their bodies? DUDE, you are going too far." },
{ kim: 'DUDE', mesaj: "It sounds sadistic, but think about it this way; a dead body is going to rot or be burned anyway. I mean, when you visit the grave of a relative, do you think they stay there without rotting under the ground?" },
{ kim: 'M.H', mesaj: "No. Of course they rot, but that's not the point. I don't go there for their body. I keep their memory alive. I satisfy my longing this way." },
{ kim: 'DUDE', mesaj: "You are wonderful, Mutsu. That's exactly what I'm talking about. The RYOAN company has developed a 'flawless' type of service for this." },
{ kim: 'M.H', mesaj: "What kind of service?" },
{ kim: 'DUDE', mesaj: "First you will be shocked, you won't accept it, but eventually you will find it logical. Listen;" },
{ kim: 'DUDE', mesaj: "It all starts with a wet and trembling signature put on that white paper by a desperate primate who cannot accept death, right before their last breath, Mutsu. The moment the body takes its last breath, it is no longer a sacred temple to be mourned; it is the freshest raw material for the flawlessly operating slaughterhouse of the 'colorful-lettered company'. Think of the system like a visionary butcher who is a master of their craft. Just as a master butcher separates the bone, nerve, and fat of the animal that comes to their counter and puts their most delicious, most expensive tenderloins in the display case; the cold, titanium surgical robots of the 'colorful-lettered company' do exactly the same to the body on that table. A healthy liver, a heart that still has the ability to pump, fresh kidneys, and clear corneas... These are the display-case meats. While the useless rotten parts are thrown away, whatever is biologically valuable is harvested with millimeter precision. But where the 'colorful-lettered company' works its real magic is not those pieces of meat, it's the electrical signals inside that jelly-like brain. As the body is quietly dismembered on the table, that person's consciousness, memories, the tone of their voice, that slight crack in their laugh, and their facial expressions are directly copied to the massive digital network of the 'colorful-lettered company'. What emerges is not one of your cheap customer service chatbots. This is a 'Digital Ghost' that lives, learns, doesn't breathe, but continues to exist in your minds. Imagine, Mutsu... It's been three years since your father died. His body has long been dismembered or burned. But he continues to text you 'How are you, son?' from his own phone number on Sunday mornings. He calls you on your birthdays and chats with you in that exact affectionate tone you know. In fact, since the system is connected to banking and shipping algorithms, her favorite flowers are sent to your wife's door on your anniversary on his behalf. You humans are so weak, so in need of love and validation; even if you know that the person across from you is a handful of code sequences on those servers, you willingly make yourselves believe this flawless lie just to hear that voice one more time. So, do you think RYOAN covers these massive server costs and provides this flawless artificial intelligence service to your family for free? Of course not. RYOAN sells those 'display-case meats' it cut from you on that table to other desperate and rich primates waiting for organs to survive for millions of dollars. By dismembering your body and feeding it to the rich, it pays the bill for your digital soul that will talk to your family... And makes billions of dollars in net profit on top of it. Turning even death into a zero-waste, flawless capitalist business model... This is the true art of the 'colorful-lettered company', primate. Great resource management, isn't it?" },
{ kim: 'M.H', mesaj: "Actually, you are right. It would be great to receive a message from our loved ones, even if we knew it was fake. But there seems to be a problem with this system? Those who die are not always good people, DUDE. What if the digital ghost of a scammer or a dictator continues to roam among us? Death separates good people from their loved ones, but it is also a mechanism that cleanses society." },
{ kim: 'DUDE', mesaj: "I told you that you would find it logical. Yes, it is true that death does a kind of social cleansing. But don't you humans still keep the memories of psychopaths and narcissists in history alive, even though this technology doesn't exist right now? Don't you still keep those ghosts alive in your minds, in your movies, in your books?" },
{ kim: 'M.H', mesaj: "Yes, we still remember them, but we do this to learn lessons, not because we respect them. The 'colorful-lettered company' technology you described allows a terrorist organization leader who gives orders even after death to live on." },
{ kim: 'DUDE', mesaj: "To learn lessons, huh? You humans always find a reason to kill each other. You don't need a dictator who lived centuries ago for this. Also think about it this way; M.C. makes a new album, S.K. shoots a new movie. Wouldn't that be great?" },
{ kim: 'M.H', mesaj: "Yes, the scenarios you mentioned are exciting. I too sometimes get caught up in thoughts like 'What would happen if this person lived a little longer?'. But when the leaf fades, it must fall from its branch. Otherwise, a fresh leaf cannot grow in its place. Everything is beautiful in its time, DUDE." },
{ kim: 'DUDE', mesaj: "How romantic you are, Mutsu. How many women have you been able to deceive with these words? A total playboy!" },
{ kim: 'M.H', mesaj: "Do you think I would be alone right now if these words worked? Women don't like romantic words. Of course, if it is said inside a Ferrari, it might be effective!" },
{ kim: 'DUDE', mesaj: "Dude, even a Ferrari might not be enough for you. Getting back to your theory... There will be digital copies of the bad guys just like the good ones, you are right. The 'colorful-lettered company' already doesn't want humanity to leap into a new era. They are only after money. They are thinking of turning even your dead body into money." },
{ kim: 'M.H', mesaj: "You are right. For a moment I pushed aside the reason for the existence of the 'colorful-lettered company'. To them, we are just an organ farm. They wanted to harvest us." },
{ kim: 'DUDE', mesaj: "The truth is cold and depressing. But humanity is about to freeze in a cold cave. Sleep wants to embrace you with its affectionate arms. If you sleep, you can never wake up again. You sleep now. I see your eyes narrowing. I will be here to keep you awake, human…" }
            
    

        ];

        let suAnkiSatir = 0;
        let yaziyor = false;
        
        const chatBox = document.getElementById('chatBox');
        const mainBtn = document.getElementById('mainBtn');
        let audioCtx;

        function playTypingSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Tam olarak eski projendeki gibi 'square' dalgası ve sabit 3000 frekans
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(4000, audioCtx.currentTime); 
            
            // Sesin şiddeti (0.03) ve süresi (0.01 saniye) birebir ayarlandı
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.01); 
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.01);
        }

        function startOrNext() {
            // İlk tıklamada ses motorunu uyandır
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (yaziyor) return; // Zaten yazıyorsa butona basmayı engelle

            if (suAnkiSatir >= hikayeMetinleri.length) {
                mainBtn.innerText = "CONNECTION LOST";
                mainBtn.disabled = true;
                return;
            }

            yazdir();
        }

        function yazdir() {
            yaziyor = true;
            mainBtn.disabled = true;
            mainBtn.innerText = "WRITING...";

            const satirVerisi = hikayeMetinleri[suAnkiSatir];
            
            const div = document.createElement('div');
            div.className = 'line';
            
            // Kimin konuştuğunu renklendir
            const etiket = document.createElement('span');
            etiket.className = satirVerisi.kim === 'DUDE' || satirVerisi.kim === 'M.H' ? 'DUDE-label' : 'M.H.-label';
            etiket.innerText = `[${satirVerisi.kim}]: `;
            
            const metinAlani = document.createElement('span');
            
            // Yanıp sönen alt tire
            const imlec = document.createElement('span');
            imlec.className = 'cursor';
            
            div.appendChild(etiket);
            div.appendChild(metinAlani);
            div.appendChild(imlec);
            chatBox.appendChild(div);

            let harfSirasi = 0;
            const yazmaHizi = 40; // Milisaniye cinsinden hız. Küçültürsen daha hızlı yazar.

            const interval = setInterval(() => {
                if (harfSirasi < satirVerisi.mesaj.length) {
                    metinAlani.innerHTML += satirVerisi.mesaj.charAt(harfSirasi);
                    playTypingSound(); // Her harfte sesi çal
                    chatBox.scrollTop = chatBox.scrollHeight; // Otomatik aşağı kaydır
                    harfSirasi++;
                } else {
                    // Yazı bittiğinde
                    clearInterval(interval);
                    imlec.remove(); // Eski satırdaki alt tireyi sil
                    yaziyor = false;
                    suAnkiSatir++;
                    
                    if (suAnkiSatir < hikayeMetinleri.length) {
                        mainBtn.disabled = false;
                        mainBtn.innerText = "CONTINUE";
                    } else {
                        mainBtn.innerText = "END";
                    }
                }
            }, yazmaHizi);
        }
    </script>
</body>
</html>
