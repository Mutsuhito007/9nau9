<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Mortal Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #FFD700;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        .app-wrapper {
            width: 90%;
            max-width: 360px;
            height: 95%;
            border: 3px solid #FFD700;
            border-radius: 10px;
            background-color: #111;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px dashed #333;
            padding-bottom: 10px;
        }
        .header h2 {
            font-size: 32px;
            letter-spacing: 2px;
            color: #FFD700;
        }

        /* 1. Form Ekranı */
        .form-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-grow: 1;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .form-screen label {
            font-size: 22px;
            color: #ccc;
        }

        input[type="date"] {
            background-color: #222;
            border: 2px solid #555;
            color: #FFD700;
            font-family: 'VT323', monospace;
            font-size: 24px;
            padding: 10px;
            border-radius: 5px;
            outline: none;
            width: 100%;
            text-align: center;
        }

        input[type="date"]:focus {
            border-color: #FF3B30;
        }

        /* 2. Ruhani Animasyon Ekranı */
        .anim-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 40px;
            text-align: center;
        }

        .mystic-orb {
            width: 100px;
            height: 100px;
            border: 2px solid #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 20px #FFD700, inset 0 0 20px #FFD700;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: breathe 3s infinite ease-in-out alternate;
        }

        .mystic-eye {
            width: 20px;
            height: 60px;
            border: 2px solid #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 10px #FFD700;
            animation: blink 4s infinite;
        }

        @keyframes breathe {
            0% { transform: scale(0.8); box-shadow: 0 0 10px #FFD700, inset 0 0 10px #FFD700; }
            100% { transform: scale(1.3); box-shadow: 0 0 40px #FF3B30, inset 0 0 40px #FF3B30; border-color: #FF3B30; }
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        .anim-text {
            font-size: 24px;
            color: #fff;
            animation: pulse-text 1s infinite alternate;
        }

        @keyframes pulse-text {
            0% { opacity: 0.5; }
            100% { opacity: 1; text-shadow: 0 0 10px #fff; }
        }

        /* 3. Sayaç Ekranı */
        .timer-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 20px;
            text-align: center;
        }

        .timer-title {
            font-size: 24px;
            color: #FF3B30;
            letter-spacing: 3px;
        }

        .timer-display {
            font-size: 50px;
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            line-height: 1.2;
            background: #222;
            padding: 20px;
            border: 2px solid #FF3B30;
            border-radius: 10px;
            width: 100%;
        }

        .timer-labels {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }

        /* Buton */
        .action-button {
            background-color: #FFD700;
            color: #000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            border: none;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            width: 100%;
            transition: transform 0.1s;
        }
        .action-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        

        <div class="form-screen" id="formScreen">
            <label>ENTER DATE OF BIRTH</label>
            <input type="date" id="birthdate">
            <button class="action-button" onclick="consultOracle()">REVEAL FATE</button>
        </div>

        <div class="anim-screen" id="animScreen">
            <div class="mystic-orb">
                <div class="mystic-eye"></div>
            </div>
            <div class="anim-text">Consulting the thread of fate...</div>
        </div>

        <div class="timer-screen" id="timerScreen">
            <div class="timer-title">TIME REMAINING</div>
            <div class="timer-display" id="timeDisplay">
                --Y --D <br> --:--:--
            </div>
            
                Your fate is sealed. Refreshing will not save you.
            </div>
        </div>
    </div>

    <script>
        const formScreen = document.getElementById('formScreen');
        const animScreen = document.getElementById('animScreen');
        const timerScreen = document.getElementById('timerScreen');
        const timeDisplay = document.getElementById('timeDisplay');
        let countdownInterval;

        // Sayfa yüklendiğinde hafızayı kontrol et
        window.onload = () => {
            const savedFate = localStorage.getItem('user_fate_timestamp');
            if (savedFate) {
                // Eğer hafızada kayıt varsa giriş formunu atla, direkt sayacı başlat
                formScreen.style.display = 'none';
                timerScreen.style.display = 'flex';
                startCountdown(parseInt(savedFate));
            }
        };

        function consultOracle() {
            const bdate = document.getElementById('birthdate').value;
            if (!bdate) {
                alert("The Oracle requires your origin. Enter your birthdate.");
                return;
            }

            // Ekran geçişi
            formScreen.style.display = 'none';
            animScreen.style.display = 'flex';

            // 4 Saniyelik Ruhani Animasyon Beklemesi
            setTimeout(() => {
                generateFate(bdate);
            }, 4000);
        }

        function generateFate(birthDateStr) {
            const birthDate = new Date(birthDateStr).getTime();
            
            // Sahte ömür algoritması: 65 ile 90 yıl arası rastgele bir ömür biçer
            const randomLifespanYears = 65 + Math.random() * 25;
            let fateTimestamp = birthDate + (randomLifespanYears * 365.25 * 24 * 60 * 60 * 1000);

            // Eğer hesaplanan ölüm tarihi geçmişte kalmışsa (oyuncu yaşlıysa),
            // sisteme rastgele 2 ile 10 yıl arası ek süre tanır ki sayaç eksiye düşmesin.
            if (fateTimestamp <= Date.now()) {
                fateTimestamp = Date.now() + ((2 + Math.random() * 8) * 365.25 * 24 * 60 * 60 * 1000);
            }

            // Kaderi tarayıcı hafızasına kalıcı olarak kazı
            localStorage.setItem('user_fate_timestamp', fateTimestamp);

            // Sayaca geç
            animScreen.style.display = 'none';
            timerScreen.style.display = 'flex';
            startCountdown(fateTimestamp);
        }

       function startCountdown(targetTime) {
            countdownInterval = setInterval(() => {
                const now = Date.now();
                const diff = targetTime - now;

                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    timeDisplay.innerHTML = "00Y 00M 00D <br> 00:00:00";
                    return;
                }

                // Milisaniyeyi parçalara ayır
                let remaining = diff;

                const years = Math.floor(remaining / (1000 * 60 * 60 * 24 * 365));
                remaining %= (1000 * 60 * 60 * 24 * 365);

                const months = Math.floor(remaining / (1000 * 60 * 60 * 24 * 30));
                remaining %= (1000 * 60 * 60 * 24 * 30);

                const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
                remaining %= (1000 * 60 * 60 * 24);

                const hours = Math.floor(remaining / (1000 * 60 * 60));
                remaining %= (1000 * 60 * 60);

                const minutes = Math.floor(remaining / (1000 * 60));
                const seconds = Math.floor((remaining % (1000 * 60)) / 1000);

                const pad = (num) => num.toString().padStart(2, '0');

                // Ekrana bas
                timeDisplay.innerHTML = `${pad(years)}Y ${pad(months)}M ${pad(days)}D <br> ${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;

            }, 1000);
        }
    </script>
</body>
</html>
