<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hikaye</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* 9nau9 Standart Retro Tasarım */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: #FFD700;
            font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; user-select: none;
        }
        .app-wrapper {
    width: 90%; max-width: 400px; height: 95%;
    border: none;
    border-radius: 10px;
    background-color: #111; padding: 20px;
    display: flex; flex-direction: column;
    position: relative;
}
        .content-area {
            flex-grow: 1; display: flex;
            justify-content: center; align-items: center;
            text-align: center; overflow: hidden;
            background-color: #0a0a0a; border: 2px solid #333;
            border-radius: 5px; padding: 10px; margin-bottom: 15px;
        }
        
        /* Yazı ve Görsel Animasyonları */
        .slide-text {
            font-size: 44px; letter-spacing: 2px;
            color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            animation: fadeIn 0.5s ease-in;
        }
        .slide-img {
            max-width: 100%; max-height: 100%;
            border-radius: 5px;
            animation: fadeIn 0.5s ease-in;
            object-fit: contain;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Sağ Sol Butonları */
        .controls {
            display: flex; justify-content: space-between; gap: 10px;
        }
        .nav-btn {
            flex: 1; background-color: #222; color: #FFD700;
            border: 2px solid #FFD700; border-radius: 5px;
            font-family: 'VT323', monospace; font-size: 28px;
            padding: 12px; cursor: pointer;
            transition: transform 0.1s, background-color 0.1s;
        }
        .nav-btn:active { transform: scale(0.95); background-color: #FFD700; color: #000; }
        .nav-btn:disabled { opacity: 0.3; border-color: #555; color: #555; cursor: not-allowed; transform: none; background-color: #222; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="content-area" id="displayArea">
            </div>
        <div class="controls">
            <button class="nav-btn" id="prevBtn" onclick="prevSlide()">&#9664; PREVIOUS</button>
            <button class="nav-btn" id="nextBtn" onclick="nextSlide()">NEXT &#9654;</button>
        </div>
    </div>

    <script>
        // İÇERİK LİSTESİ: Sırayla çıkacak metinler ve görseller
        const slides = [
            { type: 'text', value: 'A WOMAN' },
            { type: 'img', value: 'assets/1.webp' },
            
            { type: 'text', value: 'A MAN' },
            { type: 'img', value: 'assets/2.webp' },
            
            { type: 'text', value: 'A BABY' },
            { type: 'img', value: 'assets/3.webp' },
            
            { type: 'text', value: 'A CAT' },
            { type: 'img', value: 'assets/4.webp' },
            
            { type: 'text', value: ' AND A HAPPY ENDING' },
            { type: 'img', value: 'assets/5.webp' }
        ];

        let currentIndex = 0;
        const displayArea = document.getElementById('displayArea');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function renderSlide() {
            const slide = slides[currentIndex];
            displayArea.innerHTML = ''; // Ekranı temizle

            if (slide.type === 'text') {
                const txt = document.createElement('div');
                txt.className = 'slide-text';
                txt.innerText = slide.value;
                displayArea.appendChild(txt);
            } else if (slide.type === 'img') {
                const img = document.createElement('img');
                img.className = 'slide-img';
                img.src = slide.value;
                displayArea.appendChild(img);
            }

            // İlk ve son slaytlarda butonları kilitle
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === slides.length - 1);
        }

        function nextSlide() {
            if (currentIndex < slides.length - 1) {
                currentIndex++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide();
            }
        }

        // Sistemi ilk slayt ile başlat
        renderSlide();
    </script>
</body>
</html>
