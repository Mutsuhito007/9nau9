<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wormhole</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #warpDisplay {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #00FFFF;
            font-size: 28px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            pointer-events: none;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            gap: 15px;
        }
        .btn {
            flex: 1;
            background-color: #111;
            color: #00FFFF;
            border: 2px solid #00FFFF;
            font-family: 'VT323', monospace;
            font-size: 26px;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #008888;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #008888;
            background-color: #00FFFF;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="warpDisplay">WARP FACTOR: 1.0</div>
    <canvas id="wormholeCanvas"></canvas>
    <div class="controls">
        <button class="btn" id="btnSlow">SLOWER</button>
        <button class="btn" id="btnFast">FASTER</button>
    </div>

    <script>
        const canvas = document.getElementById('wormholeCanvas');
        const ctx = canvas.getContext('2d');
        const warpDisplay = document.getElementById('warpDisplay');
        
        let width, height, centerX, centerY;
        let stars = [];
        const numStars = 600;
        let speed = 2; 
        let targetSpeed = 2;

        // Ekran ayarları
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Yıldız/Parçacık oluşturucu
        for(let i = 0; i < numStars; i++) {
            stars.push({
                x: (Math.random() - 0.5) * width * 2,
                y: (Math.random() - 0.5) * height * 2,
                z: Math.random() * width,
                pz: Math.random() * width
            });
        }

        // --- SES MOTORU (Derin Uzay Uğultusu) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let rumbleOsc, rumbleGain;

        function initAudio() {
            if(!audioCtx) {
                audioCtx = new AudioContext();
                rumbleOsc = audioCtx.createOscillator();
                rumbleGain = audioCtx.createGain();
                
                // Sinüs kadar zayıf olmayan ama testere kadar da tırmalamayan üçgen dalga
                rumbleOsc.type = 'triangle'; 
                rumbleOsc.frequency.value = 80; // Standart hoparlörlerin duyabileceği ideal alt frekans
                
                // Ses seviyesini duyulabilir tatlı bir noktaya (0.02) çektik
                rumbleGain.gain.value = 0.02; 
                
                rumbleOsc.connect(rumbleGain);
                rumbleGain.connect(audioCtx.destination);
                rumbleOsc.start();
            }
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function updateAudio() {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            
            // Hız arttıkça motorun devri (frekans) ve sesi (vol) tatlıca artsın
            const newFreq = 80 + (speed * 2);
            const newVol = 0.02 + (speed * 0.002); 
            
            // Geçişleri yumuşak tutuyoruz (0.5 saniye)
            rumbleOsc.frequency.linearRampToValueAtTime(Math.min(newFreq, 140), now + 0.5);
            rumbleGain.gain.linearRampToValueAtTime(Math.min(newVol, 0.08), now + 0.5);
        }

        // --- GÖRSEL MOTOR (Wormhole Döngüsü) ---
        function update() {
            // Hızı yumuşak bir şekilde hedefe ulaştır
            speed += (targetSpeed - speed) * 0.05; 
            warpDisplay.innerText = `WARP FACTOR: ${(speed / 2).toFixed(1)}`;

            // Arka planı hafif saydam siyahla temizle (Hız izi efekti)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
            ctx.fillRect(0, 0, width, height);

            for(let i = 0; i < numStars; i++) {
                let star = stars[i];
                star.z -= speed;

                // Parçacık kamerayı geçince arkada yeniden doğur
                if(star.z <= 0) {
                    star.x = (Math.random() - 0.5) * width * 2;
                    star.y = (Math.random() - 0.5) * height * 2;
                    star.z = width;
                    star.pz = width;
                }

                // 3D uzayı 2D ekrana yansıtma matematiği
                let sx = (star.x / star.z) * 100 + centerX;
                let sy = (star.y / star.z) * 100 + centerY;
                let px = (star.x / star.pz) * 100 + centerX;
                let py = (star.y / star.pz) * 100 + centerY;

                star.pz = star.z;

                // Parçacık yaklaştıkça parlar ve rengi değişir
                let colorVal = Math.floor((1 - star.z / width) * 255);
                ctx.strokeStyle = `rgb(${colorVal/2}, ${colorVal}, 255)`; // Mavi/Neon vizyonu
                ctx.lineWidth = Math.max(0.5, (1 - star.z / width) * 3 * (speed/3));
                
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(sx, sy);
                ctx.stroke();
            }
            requestAnimationFrame(update);
        }
        update();

        // --- KONTROLLER ---
        document.getElementById('btnFast').addEventListener('pointerdown', () => {
            initAudio();
            targetSpeed = Math.min(targetSpeed + 4, 30); // Maksimum hız sınırı
            updateAudio();
        });

        document.getElementById('btnSlow').addEventListener('pointerdown', () => {
            initAudio();
            targetSpeed = Math.max(targetSpeed - 4, 0.5); // Minimum hız sınırı
            updateAudio();
        });
    </script>
</body>
</html>
