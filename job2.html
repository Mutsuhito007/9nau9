<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hikaye</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* 9nau9 Standart Retro Tasarım */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: #FFD700;
            font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; user-select: none;
        }
        .app-wrapper {
            width: 90%; max-width: 400px; height: 95%;
            border: none;
            border-radius: 10px;
            background-color: #111; padding: 20px;
            display: flex; flex-direction: column;
            position: relative;
        }
        
        /* İçerik Alanı - Kaydırma (Scroll) eklendi */
        .content-area {
            flex-grow: 1; display: flex;
            justify-content: center; align-items: center;
            text-align: center; 
            overflow-y: auto; /* Taşan uzun metinler için dikey kaydırma açıldı */
            overflow-x: hidden;
            background-color: #0a0a0a; border: 2px solid #333;
            border-radius: 5px; padding: 15px; margin-bottom: 15px;
        }

        /* Retro Scrollbar (Kaydırma Çubuğu) Tasarımı */
        .content-area::-webkit-scrollbar { width: 8px; }
        .content-area::-webkit-scrollbar-track { background: #0a0a0a; }
        .content-area::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }
        
        /* Yazı ve Görsel Animasyonları */
        .slide-text {
            font-size: 44px; letter-spacing: 2px;
            color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            animation: fadeIn 0.5s ease-in;
        }

        /* UZUN METİNLER İÇİN ÖZEL CLASS */
        .slide-text.long {
            font-size: 24px; /* Uzun metin okunsun diye küçültüldü */
            text-align: left; /* Sola hizalandı */
            line-height: 1.4; /* Satır aralığı açıldı */
            letter-spacing: 1px;
            white-space: pre-wrap; /* Paragraf boşlukları (enter) korundu */
            width: 100%;
        }

        .slide-img {
            max-width: 100%; max-height: 100%;
            border-radius: 5px;
            animation: fadeIn 0.5s ease-in;
            object-fit: contain;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Sağ Sol Butonları */
        .controls {
            display: flex; justify-content: space-between; gap: 10px;
        }
        .nav-btn {
            flex: 1; background-color: #222; color: #FFD700;
            border: 2px solid #FFD700; border-radius: 5px;
            font-family: 'VT323', monospace; font-size: 28px;
            padding: 12px; cursor: pointer;
            transition: transform 0.1s, background-color 0.1s;
        }
        .nav-btn:active { transform: scale(0.95); background-color: #FFD700; color: #000; }
        .nav-btn:disabled { opacity: 0.3; border-color: #555; color: #555; cursor: not-allowed; transform: none; background-color: #222; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="content-area" id="displayArea">
            </div>
        <div class="controls">
            <button class="nav-btn" id="prevBtn" onclick="prevSlide()">&#9664; PREV</button>
            <button class="nav-btn" id="nextBtn" onclick="nextSlide()">NEXT &#9654;</button>
        </div>
    </div>

    <script>
        // İÇERİK LİSTESİ: Sırayla çıkacak metinler ve görseller
        const slides = [
            { type: 'img', value: 'assets/7.webp' },
            {
                type: 'text',
                value: `Humanity’s energy crisis ends not on Earth, but 384,400 kilometers away. By moving our primary energy generation off-world, we can completely eliminate fossil fuels, protect our planet's atmosphere, and unlock a truly limitless and clean power source.

The Lunar Infrastructure:
Massive, highly advanced solar arrays will be installed across the lunar surface. Free from the atmospheric interference, weather conditions, and day-night limitations of Earth, these lunar panels will operate at maximum efficiency, absorbing raw solar radiation and generating astronomical amounts of electrical power.

The Transmission Mechanism:
To bring this power home, the generated electricity will be converted into highly concentrated, high-frequency laser beams. These beams will act as a wireless energy bridge, transmitting power safely and directly across the vacuum of space to designated receiver stations on Earth.

The Earth-Side Conversion:
Upon reaching Earth's surface, the laser beams will be captured by sprawling receiver facilities equipped with colossal, precision-engineered lenses. These lenses will collect and focus the intense optical energy, directing it into specialized thermal water reservoirs. The immense heat from the concentrated lasers will instantly boil the water, creating highly pressurized, superheated steam.

The Final Output:
This steam will then be used to drive state-of-the-art turbine generators, converting the thermal energy back into a stable, zero-emission electrical grid for the entire planet.

The result is a perfect utopian loop: harnessing the silent power of the cosmos to light up the Earth, forever.`
            },
            
        ];

        let currentIndex = 0;
        const displayArea = document.getElementById('displayArea');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function renderSlide() {
            const slide = slides[currentIndex];
            displayArea.innerHTML = ''; // Ekranı temizle
            
            // Eğer yeni bir slayta geçersek scroll'u (kaydırmayı) en başa al
            displayArea.scrollTop = 0;

            if (slide.type === 'text') {
                const txt = document.createElement('div');
                txt.className = 'slide-text';
                txt.innerText = slide.value;
                
                // Karar mekanizması: Metin 50 karakterden uzunsa "long" sınıfını ekle
                if (slide.value.length > 50) {
                    txt.classList.add('long');
                    displayArea.style.alignItems = 'flex-start'; // Metni yukarı yasla
                } else {
                    displayArea.style.alignItems = 'center'; // Kısa metni ortala
                }
                
                displayArea.appendChild(txt);
            } else if (slide.type === 'img') {
                displayArea.style.alignItems = 'center'; // Görselleri her zaman ortala
                const img = document.createElement('img');
                img.className = 'slide-img';
                img.src = slide.value;
                displayArea.appendChild(img);
            }

            // İlk ve son slaytlarda butonları kilitle
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === slides.length - 1);
        }

        function nextSlide() {
            if (currentIndex < slides.length - 1) {
                currentIndex++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide();
            }
        }

        // Sistemi ilk slayt ile başlat
        renderSlide();
    </script>
</body>
</html>
