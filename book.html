<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hikaye</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* 9nau9 Standart Retro Tasarım */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: #FFD700;
            font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; user-select: none;
        }
        .app-wrapper {
            width: 90%; max-width: 400px; height: 95%;
            border: none;
            border-radius: 10px;
            background-color: #111; padding: 20px;
            display: flex; flex-direction: column;
            position: relative;
        }
        
        /* İçerik Alanı - Kaydırma (Scroll) eklendi */
        .content-area {
            flex-grow: 1; display: flex;
            justify-content: center; align-items: center;
            text-align: center; 
            overflow-y: auto; /* Taşan uzun metinler için dikey kaydırma açıldı */
            overflow-x: hidden;
            background-color: #0a0a0a; border: 2px solid #333;
            border-radius: 5px; padding: 15px; margin-bottom: 15px;
        }

        /* Retro Scrollbar (Kaydırma Çubuğu) Tasarımı */
        .content-area::-webkit-scrollbar { width: 8px; }
        .content-area::-webkit-scrollbar-track { background: #0a0a0a; }
        .content-area::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }
        
        /* Yazı ve Görsel Animasyonları */
        .slide-text {
            font-size: 44px; letter-spacing: 2px;
            color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            animation: fadeIn 0.5s ease-in;
        }

        /* UZUN METİNLER İÇİN ÖZEL CLASS */
        .slide-text.long {
            font-size: 24px; /* Uzun metin okunsun diye küçültüldü */
            text-align: left; /* Sola hizalandı */
            line-height: 1.4; /* Satır aralığı açıldı */
            letter-spacing: 1px;
            white-space: pre-wrap; /* Paragraf boşlukları (enter) korundu */
            width: 100%;
        }

        .slide-img {
            max-width: 100%; max-height: 100%;
            border-radius: 5px;
            animation: fadeIn 0.5s ease-in;
            object-fit: contain;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Sağ Sol Butonları */
        .controls {
            display: flex; justify-content: space-between; gap: 10px;
        }
        .nav-btn {
            flex: 1; background-color: #222; color: #FFD700;
            border: 2px solid #FFD700; border-radius: 5px;
            font-family: 'VT323', monospace; font-size: 28px;
            padding: 12px; cursor: pointer;
            transition: transform 0.1s, background-color 0.1s;
        }
        .nav-btn:active { transform: scale(0.95); background-color: #FFD700; color: #000; }
        .nav-btn:disabled { opacity: 0.3; border-color: #555; color: #555; cursor: not-allowed; transform: none; background-color: #222; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="content-area" id="displayArea">
            </div>
        <div class="controls">
            <button class="nav-btn" id="prevBtn" onclick="prevSlide()">&#9664; PREV</button>
            <button class="nav-btn" id="nextBtn" onclick="nextSlide()">READ &#9654;</button>
        </div>
    </div>

    <script>
        // İÇERİK LİSTESİ: Sırayla çıkacak metinler ve görseller
        const slides = [
            { type: 'img', value: 'assets/25.webp' },
            {
                type: 'text',
                value: `A terrifying storm in the middle of the ocean... A damaged, sinking human ship barely drops anchor on the shore of an uncharted island. The ship is heavily wounded; repairing it will take months. As the crew desperately tries to fix the ship on the shore in despair, the Captain sets out to explore the island.

Heading deeper into the jungle, he hears something impossible: the sound of music. Rhythm, melody, and harmony. The Captain slowly peers through the trees and thinks he has lost his mind at what he sees. A group of monkeys is singing and dancing around a fire. He thinks what he is seeing is a dream, a hallucination, but everything is too real. The monkeys on this island have built a civilization; they have their own music, rituals, and a flawless peace.

As the Captain watches this festivity in horror, a monkey suddenly emerges from the tall grass right next to him and speaks calmly: "Welcome to our island, human. We haven't seen a human in a long time."

The Captain stumbles backward in shock and falls to the ground. He is panting. "You... you can speak! And in my language, too!"

"Yes," the monkey says with a smile. "We know your language. Years ago, a sailor who had lost his way like you came to this island. His name was Adam. He taught us how to speak, dance, sing, and make tools. He loved us very much, and we loved him... But unfortunately, we buried him a short time ago."

The Captain is still trembling. "But you are monkeys! Adam might have taught you words, but this intelligence... How can you be so intelligent?"

"Ah, yes," the monkey says. "Adam was very surprised at first, too. High up on the island, there is a special, golden-yellow type of banana that only grows here. We have been eating these bananas for centuries. Thanks to this fruit, we lived in peace for centuries. There has never been a fight or a murder on this island to this day. Adam wanted to talk to us. He wondered how we could live in such unity. He couldn't learn our language. The bananas only made us intelligent. But we learned his language. We told him about our civilization, and he told us about his. As Adam got to know us, he distanced himself from his own kind. He decided to live with us. For the rest of his life, he lived with us, singing and dancing. The bananas on the island didn't make him intelligent, perhaps, but the island gave him other blessings to survive."

The Captain talks with the monkey for a while longer, witnessing their pure, compassionate, and civilized world. Then, with slow steps, he returns to the shore, to his own world. He locks himself in his cabin. The dark mind of mankind has started to work. If he could take these monkeys back to his country, he could create a flawless army of workers who are intelligent and understand commands but are exempt from human rights, and he could sell them.

But there is a problem: the monkeys are intelligent enough to refuse to be slaves.

The Captain and the ship's doctor concoct a disgusting scenario. They set up a makeshift laboratory in the middle of the island and tell the monkeys they will conduct a 'health screening' in memory of Thomas. The monkeys trust humans. Because the first and only human they knew, Thomas, had only done them good.

The doctor pretends to examine fake blood tests and turns to the Captain. With a look of fake sorrow on his face, the Captain tells the monkeys that great lie: "My friends... You have codes in your genes that will allow you to live for centuries without ever getting sick. But those golden bananas that make you so intelligent are burning your cells. Your intelligence is shortening your lifespan. You don't need to be this intelligent to live on this peaceful island anyway. If you eat those bananas in the limited portions we determine, your consciousness will dull a bit, but you will never get sick, and you will live for centuries."

The monkeys, with that pure feeling of 'trust' inherited from Adam, believe this lie. They begin to eat the bananas in the doses determined by the humans. And over time... they quietly become foolish. Their ability to think, question, and philosophize disappears. Driven by the fear of losing their long lives, they turn into simple creatures that obey all the instructions of humans.

Months pass, and the ship is repaired. The Captain gathers the monkeys, whose intelligence has now dropped to the level of a child: "My friends, the resources of this island are depleting. Soon, this place will be underwater. But do not fear, we will take you to a much larger and safer island, filled to its borders with bananas!" Having lost their ability to question, the monkeys obediently accept this offer.

The Captain's plan has worked flawlessly. He holds in his hands thousands of obedient monkeys he can sell cheaply, along with the coordinates of the magic banana island used to keep them just intelligent enough. The monkeys are loaded into the dark holds of the ship.

When the ship returns to the city, the Captain has a massive stage built. He begins marketing these miraculous, command-taking, never-rebelling worker monkeys, as well as the bananas that control their intelligence, to factories, mines, and the wealthy. He earns an unbelievable fortune from both trades.

And the name of that massive empire he founded is this: The Big Banana Company.`
            },
            
        ];

        let currentIndex = 0;
        const displayArea = document.getElementById('displayArea');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function renderSlide() {
            const slide = slides[currentIndex];
            displayArea.innerHTML = ''; // Ekranı temizle
            
            // Eğer yeni bir slayta geçersek scroll'u (kaydırmayı) en başa al
            displayArea.scrollTop = 0;

            if (slide.type === 'text') {
                const txt = document.createElement('div');
                txt.className = 'slide-text';
                txt.innerText = slide.value;
                
                // Karar mekanizması: Metin 50 karakterden uzunsa "long" sınıfını ekle
                if (slide.value.length > 50) {
                    txt.classList.add('long');
                    displayArea.style.alignItems = 'flex-start'; // Metni yukarı yasla
                } else {
                    displayArea.style.alignItems = 'center'; // Kısa metni ortala
                }
                
                displayArea.appendChild(txt);
            } else if (slide.type === 'img') {
                displayArea.style.alignItems = 'center'; // Görselleri her zaman ortala
                const img = document.createElement('img');
                img.className = 'slide-img';
                img.src = slide.value;
                displayArea.appendChild(img);
            }

            // İlk ve son slaytlarda butonları kilitle
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === slides.length - 1);
        }

        function nextSlide() {
            if (currentIndex < slides.length - 1) {
                currentIndex++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide();
            }
        }

        // Sistemi ilk slayt ile başlat
        renderSlide();
    </script>
</body>
</html>
