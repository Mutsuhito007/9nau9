<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9nau9 - Wallpapers</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* 9nau9 yapısına uygun koyu arka plan */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Sayfanın kaymasını engeller, uygulama hissi verir */
        }

        .gallery-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .image-wrapper {
            flex-grow: 1; /* Görselin ekranın büyük kısmını kaplamasını sağlar */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 500px;
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 70vh; /* Görselin butonların üstüne taşmasını engeller */
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            object-fit: cover;
        }

        .controls {
            height: 15vh; /* Butonlara ekranın altında sabit bir alan ayırır */
            display: flex;
            gap: 20px;
            align-items: center;
        }

       button {
            padding: 12px 35px;
            font-family: 'Courier New', Courier, monospace; /* Retro pixel havası veren yazı tipi */
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase; /* Harfleri tamamen büyük yapar */
            cursor: pointer;
            background-color: #ffcc00; /* Canlı sarı */
            color: #000000; /* Tam siyah yazı */
            border: 4px solid #000000; /* Kalın, sert pixel kenarlık */
            border-radius: 0px; /* Pixel art ruhu için köşeleri tamamen sıfırlıyoruz */
            box-shadow: 5px 5px 0px #000000; /* 8-bit derinlik veren sağ-alt gölge */
            outline: none;
            transition: none; /* Pixel tasarımda yumuşak geçiş olmaz, tepkiler sert olmalı */
        }

        button:active {
            /* Butona basıldığında tam gölgenin üzerine oturarak içeri çökme efekti verir */
            transform: translate(5px, 5px);
            box-shadow: 0px 0px 0px #000000;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <div class="image-wrapper">
            <img id="wallpaper-img" src="" alt="9nau9 Wallpaper">
        </div>
        
        <div class="controls">
            <button id="download-btn" onclick="downloadImage()">Download</button>
            <button id="next-btn" onclick="nextImage()">Next</button>
        </div>
    </div>

    <script>
        // 👇 GÖRSELLERİNİ BURAYA EKLEYECEKSİN 👇
        const images = [
            "assets/1.jpg", 
            "assets/2.jpg", 
            "assets/3.jpg",
            "assets/4.jpg",
            "assets/5.jpg",
            "assets/6.jpg",
            "assets/7.jpg",
            "assets/8.jpg", 
        ];
        // 👆 GÖRSELLERİNİ BURAYA EKLEYECEKSİN 👆

        let currentIndex = 0;
        const imgElement = document.getElementById("wallpaper-img");

        // Sayfa ilk açıldığında ilk görseli ekrana basar
        window.onload = () => {
            if(images.length > 0) {
                imgElement.src = images[currentIndex];
            }
        };

        // 'Next' butonuna basıldığında çalışan fonksiyon
        function nextImage() {
            if(images.length === 0) return;
            // Sıradaki görsele geçer, sona gelirse başa döner
            currentIndex = (currentIndex + 1) % images.length;
            imgElement.src = images[currentIndex];
        }

        // 'Download' butonuna basıldığında çalışan fonksiyon
        function downloadImage() {
            if(images.length === 0) return;
            
            const link = document.createElement('a');
            link.href = images[currentIndex];
            
            // İndirilen dosyanın adını otomatik olarak belirler (Örn: 9nau9_WP_1)
            link.download = '9nau9_WP_' + (currentIndex + 1); 
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
