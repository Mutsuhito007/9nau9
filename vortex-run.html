<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex Run</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: manipulation;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #FFD700;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Ana Kasa */
        .app-wrapper {
            width: 95%;
            max-width: 400px;
            height: 95%;
            border: 3px solid #333;
            border-radius: 10px;
            background-color: #0a0a0a;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 30px #000;
            overflow: hidden;
        }

        /* Dönen Oyun Çerçevesi (Mobil Optimize Edildi) */
        .circle-container {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 4px dashed #FFD700;
            overflow: hidden;
            position: relative;
            
            /* MOBİL PERFORMANS İÇİN SİHİRLİ KODLAR (GPU'yu zorlar) */
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
            
            /* Mobilde kasıntı yaptığı için box-shadow efektini kaldırdık */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #111;
        }

        /* Skor ve UI Ekranları (Sabit Kalacaklar) */
        #hudScore {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 48px;
            color: #fff;
            z-index: 5;
            pointer-events: none;
            text-shadow: 2px 2px 0px #FF3B30;
            display: none;
        }

        .ui-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            padding: 20px;
        }

        .title {
            font-size: 48px;
            color: #FFD700;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .action-button {
            background-color: #FFD700;
            color: #000;
            border: none;
            font-family: 'VT323', monospace;
            font-size: 28px;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #b39700;
            margin-top: 20px;
        }

        .action-button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #b39700;
        }
    </style>
</head>
<body>

    <div class="app-wrapper" id="mainWrapper">
        <div id="hudScore">0</div>

        <!-- Dönen Yuvarlak Alan -->
        <div class="circle-container" id="gameCircle">
            <!-- 320x320 Sabit Çözünürlük -->
            <canvas id="gameCanvas" width="320" height="320"></canvas>
        </div>

        <!-- Başlangıç Ekranı -->
        <div class="ui-screen" id="startScreen">
            
            <div style="font-family: 'Roboto', sans-serif; font-size: 14px; color: #ccc; line-height: 1.5; margin-bottom: 20px;">
                Tap anywhere to jump.<br>
                WARNING: The world revolves around you. The longer you survive, the faster it spins. Try not to throw up.
            </div>
            <button class="action-button" onclick="startGame()">START SPINNING</button>
        </div>

        <!-- Bitiş Ekranı -->
        <div class="ui-screen" id="endScreen" style="display: none;">
            <div class="title" style="color: #FF3B30;">DIZZY YET?</div>
            <div style="font-size: 28px; color: #4CD964; margin-bottom: 20px;" id="finalScore">SCORE: 0</div>
            <button class="action-button" onclick="startGame()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameCircle = document.getElementById('gameCircle');
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const hudScore = document.getElementById('hudScore');
        const finalScore = document.getElementById('finalScore');
        const mainWrapper = document.getElementById('mainWrapper');

        // Oyun ve Dönüş Değişkenleri
        let frames = 0;
        let score = 0;
        let gameLoop;
        let isGameOver = false;
        
        let currentAngle = 0;
        let rotationSpeed = 0.5; // Başlangıç dönme hızı
        let rotationDirection = 1; // YENİ: 1 sağa döndürür, -1 sola döndürür

        // --- SES MOTORU ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'jump') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
        }

        // --- FİZİK VE NESNELER ---
        const floorY = 240; // Zeminin Y eksenindeki yeri

        const player = {
            x: 60,
            y: floorY - 20,
            size: 20,
            vy: 0,
            gravity: 0.6,
            jumpPower: -9,
            isJumping: false,
            draw: function() {
                ctx.fillStyle = '#4CD964'; // Yeşil oyuncu
                ctx.fillRect(this.x, this.y, this.size, this.size);
                
                // Göz (Hareketi hissetmek için)
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 12, this.y + 4, 4, 4);
            },
            update: function() {
                this.vy += this.gravity;
                this.y += this.vy;

                // Yere çarpma kontrolü
                if (this.y >= floorY - this.size) {
                    this.y = floorY - this.size;
                    this.vy = 0;
                    this.isJumping = false;
                }
            },
            jump: function() {
                if (!this.isJumping) {
                    this.vy = this.jumpPower;
                    this.isJumping = true;
                    playSound('jump');
                }
            }
        };

        const obstacles = {
            array: [],
            speed: 4,
            draw: function() {
                for (let i = 0; i < this.array.length; i++) {
                    let obs = this.array[i];
                    ctx.fillStyle = obs.color; // Artık her engelin kendi rengi var
                    ctx.fillRect(obs.x, floorY - obs.height, obs.width, obs.height);
                }
            },
            update: function() {
                // Engel oluşturma sıklığı
                if (frames % 90 === 0) {
                    let rand = Math.random();
                    let h, w, color;

                    // %50 İhtimal: Standart Kırmızı Engel
                    if (rand < 0.5) {
                        h = Math.random() * 15 + 15; 
                        w = 20;
                        color = '#FF3B30'; 
                    } 
                    // %35 İhtimal: Uzun ve İnce Turuncu Engel (Sırık)
                    else if (rand < 0.85) {
                        h = Math.random() * 20 + 40; // Max zıplama sınırına (65px) yakın
                        w = 15; // İnce
                        color = '#FF9500'; 
                    } 
                    // %15 İhtimal: Kısa ama Geniş Mor Engel (Kütük)
                    else {
                        h = Math.random() * 10 + 15; 
                        w = 40; // Geniş
                        color = '#AF52DE'; 
                    }

                    this.array.push({
                        x: 320,
                        width: w,
                        height: h,
                        color: color,
                        passed: false
                    });
                }

                for (let i = 0; i < this.array.length; i++) {
                    let obs = this.array[i];
                    obs.x -= this.speed;

                    // Çarpışma Testi (AABB)
                    if (player.x < obs.x + obs.width &&
                        player.x + player.size > obs.x &&
                        player.y + player.size > floorY - obs.height) {
                        endGame();
                    }

                    // Skoru Artır
                    if (obs.x + obs.width < player.x && !obs.passed) {
                        score++;
                        hudScore.innerText = score;
                        obs.passed = true;
                    }

                    // Ekrandan çıkanı sil
                    if (obs.x + obs.width < 0) {
                        this.array.shift();
                        i--;
                    }
                }
            },
            reset: function() {
                this.array = [];
            }
        };

        function drawWorld() {
            // Arka plan
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Zemin Çizgisi
            ctx.fillStyle = '#222';
            ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);
            
            // Zemin Sınırı (Sarı)
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(0, floorY, canvas.width, 2);

            // Arka plana dönme hissini artıracak yıldızlar/noktalar ekleyelim
            ctx.fillStyle = '#333';
            for (let i = 0; i < 5; i++) {
                ctx.fillRect((frames * 0.5 + i * 80) % 320, 50 + (i * 30), 4, 4);
            }
        }

        // Ana Oyun Döngüsü
        function loop() {
            if (isGameOver) return;

            drawWorld();
            obstacles.draw();
            obstacles.update();
            player.draw();
            player.update();

            // --- VORTEX MEKANİĞİ: KAMERAYI DÖNDÜR ---
            
            // TROLL DOKUNUŞU: Her 250 frame'de (yaklaşık 4 saniyede) bir yön değişme ihtimali
            if (frames % 250 === 0 && frames > 0) {
                // %50 ihtimalle dönüş yönünü tam tersine çevir
                if (Math.random() > 0.5) {
                    rotationDirection *= -1; 
                }
            }

            // Açıyı hız ve yön çarpımıyla güncelle
            currentAngle += (rotationSpeed * rotationDirection);
            
            // Zaman geçtikçe dönüş şiddetini artır (Yönden bağımsız olarak hızlanır)
            rotationSpeed += 0.0005; 
            
            // CSS Transform ile çerçeveyi çevir (translateZ(0) ile 3D donanım hızlandırmasını devreye sokuyoruz)
            gameCircle.style.transform = `rotate(${currentAngle}deg) translateZ(0)`;

            frames++;
            gameLoop = requestAnimationFrame(loop);
        }

        // Oyuncu ekranda herhangi bir yere dokunduğunda/tıkladığında zıplar
        mainWrapper.addEventListener('pointerdown', (e) => {
            // Butonlara basılıyorsa atla
            if (e.target.tagName === 'BUTTON') return; 
            e.preventDefault();
            if (!isGameOver) {
                player.jump();
            }
        });

        function startGame() {
            // Sistemleri Sıfırla
            player.y = floorY - 20;
            player.vy = 0;
            player.isJumping = false;
            obstacles.reset();
            score = 0;
            frames = 0;
            isGameOver = false;
            
            // Rotasyonları Sıfırla
            currentAngle = 0;
            rotationSpeed = 0.5;
            rotationDirection = 1; // Her yeni oyunda sağa dönerek başlar
            gameCircle.style.transform = `rotate(0deg)`;

            hudScore.innerText = score;
            hudScore.style.display = 'block';
            startScreen.style.display = 'none';
            endScreen.style.display = 'none';

            // Tarayıcı ses motorunu uyandır
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            loop();
        }

        function endGame() {
            if (isGameOver) return;
            
            playSound('crash');
            isGameOver = true;
            cancelAnimationFrame(gameLoop);
            
            hudScore.style.display = 'none';
            endScreen.style.display = 'flex';
            finalScore.innerText = `SCORE: ${score}`;
        }
    </script>
</body>
</html>
