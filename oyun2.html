        /* Ekranı siyah bir sinema perdesi gibi ayarlıyoruz ve içeriği tam merkeze hizalıyoruz */

            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #111; 
            display: flex; 
            align-items: center; /* Dikeyde tam ortaya hizalar */

            width: 100%; 
            aspect-ratio: 1 / 1; /* En can alıcı komut: Oyunu kare formunda tutar */

            border: none; 
        }
