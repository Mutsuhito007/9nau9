<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar System Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #020208; /* Derin uzay siyahı */
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #systemHUD {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #4af626; /* Retro terminal yeşili */
            font-size: 14px;
            line-height: 1.5;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(74, 246, 38, 0.5);
            z-index: 10;
        }
    </style>
</head>
<body>
    
    <canvas id="spaceCanvas"></canvas>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Gezegen Verileri ve Diyalogları
        const planets = [
            { name: "MERCURY", distance: 50,  radius: 3,   speed: 0.03,   color: "#888888", angle: Math.random() * Math.PI * 2, dialogue: "Too hot to handle!" },
            { name: "VENUS",   distance: 75,  radius: 5.5, speed: 0.02,   color: "#e3bb76", angle: Math.random() * Math.PI * 2, dialogue: "I'm literally toxic." },
            { name: "EARTH",   distance: 105, radius: 6,   speed: 0.015,  color: "#2f729e", angle: Math.random() * Math.PI * 2, dialogue: "I am not flat!" },
            { name: "MARS",    distance: 135, radius: 4.5, speed: 0.012,  color: "#c1440e", angle: Math.random() * Math.PI * 2, dialogue: "Waiting for Elon..." },
            { name: "JUPITER", distance: 185, radius: 14,  speed: 0.007,  color: "#b07f35", angle: Math.random() * Math.PI * 2, dialogue: "I have a gas problem." },
            { name: "SATURN",  distance: 245, radius: 11,  speed: 0.005,  color: "#e2bf7d", angle: Math.random() * Math.PI * 2, hasRings: true, dialogue: "Put a ring on it!" },
            { name: "URANUS",  distance: 295, radius: 8,   speed: 0.003,  color: "#4b70dd", angle: Math.random() * Math.PI * 2, dialogue: "Stop laughing at my name." },
            { name: "NEPTUNE", distance: 345, radius: 7.5, speed: 0.002,  color: "#274687", angle: Math.random() * Math.PI * 2, dialogue: "Has anyone seen Pluto?" }
        ];

        function animate() {
            // Uzay boşluğu temizliği
            ctx.fillStyle = '#020208';
            ctx.fillRect(0, 0, width, height);

            // --- 1. GÜNEŞ'İ ÇİZ (SUN) ---
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, 22, 0, Math.PI * 2);
            ctx.fillStyle = "#ffcc00";
            // Güneş parlaması efekti
            ctx.shadowBlur = 30;
            ctx.shadowColor = "#ffaa00";
            ctx.fill();
            ctx.restore();

            // Güneş ismi (English)
            ctx.fillStyle = "#ffffff";
            ctx.font = "10px 'Share Tech Mono'";
            ctx.textAlign = "center";
            ctx.fillText("SUN", centerX, centerY + 4);

            // --- 2. YÖRÜNGELERİ VE GEZEGENLERİ ÇİZ ---
            planets.forEach(planet => {
                // Yörünge Çizgisi (Orbit Lines)
                ctx.beginPath();
                ctx.arc(centerX, centerY, planet.distance, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.06)";
                ctx.lineWidth = 1;
                ctx.stroke();

                // Gezegenin anlık X ve Y koordinat matematiği
                planet.angle += planet.speed; // Gezegeni döndür
                const planetX = centerX + Math.cos(planet.angle) * planet.distance;
                const planetY = centerY + Math.sin(planet.angle) * planet.distance;

                // Gezegen Gövdesi
                ctx.beginPath();
                ctx.arc(planetX, planetY, planet.radius, 0, Math.PI * 2);
                ctx.fillStyle = planet.color;
                ctx.fill();

                // Satürn için özel halka çizimi (Saturn's Rings)
                if (planet.hasRings) {
                    ctx.save();
                    ctx.translate(planetX, planetY);
                    ctx.rotate(0.2); // Halkaları hafif eğimli yap
                    ctx.beginPath();
                    ctx.ellipse(0, 0, planet.radius * 1.6, planet.radius * 0.5, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(226, 191, 125, 0.5)";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.restore();
                }

                // Gezegen İsim Etiketleri (English Labels)
                // Gezegen İsim Etiketleri (English Labels)
                ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
                ctx.font = "9px 'Share Tech Mono'";
                ctx.textAlign = "left";
                ctx.fillText(planet.name, planetX + planet.radius + 5, planetY + 3);

                // Tüm Gezegenler için Konuşma Balonu (Universal Speech Bubbles)
                if (planet.dialogue) {
                    ctx.save();
                    
                    const text = planet.dialogue;
                    ctx.font = "bold 10px 'Share Tech Mono'";
                    const textWidth = ctx.measureText(text).width;
                    
                    // Balon kutusunun boyutları ve konumu
                    const bubbleW = textWidth + 10;
                    const bubbleH = 16;
                    const bubbleX = planetX - bubbleW / 2;
                    // Balonu gezegenin boyutuna göre biraz daha yukarı alıyoruz ki çakışmasın
                    const bubbleY = planetY - planet.radius - 22;

                    // 1. Balonun Arka Planı (Beyaz Kutu)
                    ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                    ctx.strokeStyle = planet.color; // Kenarlık gezegenin kendi renginde olacak!
                    ctx.lineWidth = 1.5;
                    ctx.fillRect(bubbleX, bubbleY, bubbleW, bubbleH);
                    ctx.strokeRect(bubbleX, bubbleY, bubbleW, bubbleH);

                    // 2. Balonun Ok İşareti (Aşağıyı gösteren küçük üçgen)
                    ctx.beginPath();
                    ctx.moveTo(planetX - 4, bubbleY + bubbleH);
                    ctx.lineTo(planetX + 4, bubbleY + bubbleH);
                    ctx.lineTo(planetX, bubbleY + bubbleH + 4);
                    ctx.closePath();
                    ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                    ctx.fill();
                    ctx.stroke();

                    // 3. Balonun İçindeki Yazı
                    ctx.fillStyle = "#000000";
                    ctx.textAlign = "center";
                    ctx.fillText(text, planetX, bubbleY + 11);
                    
                    ctx.restore();
                }
            });

            requestAnimationFrame(animate);
        }

        // Animasyon döngüsünü başlatıyoruz
        animate();
    </script>
</body>
</html>
