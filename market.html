<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9nau9 - Karaborsa</title>
    
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
        }

        .market-header {
            text-align: center;
            padding: 20px;
            background: #111;
            border-bottom: 2px solid #ff003c;
        }

        .market-header h1 {
            margin: 0;
            color: #ff003c;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .market-header p {
            color: #888;
            font-style: italic;
        }

        .market-dashboard {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #222;
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid #444;
            font-size: 1.2rem;
        }

        .stat-box strong {
            color: #00ffcc;
            font-size: 1.5rem;
        }

        .timer-box strong {
            color: #ff003c;
        }

        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #ff003c;
        }

        .product-title {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .product-desc {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 15px;
        }

        .buy-btn, #inventory-btn {
            background: transparent;
            color: #ff003c;
            border: 1px solid #ff003c;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-family: inherit;
        }

        #inventory-btn {
            color: #00ffcc;
            border-color: #00ffcc;
        }

        .buy-btn:hover {
            background: #ff003c;
            color: #fff;
        }

        #inventory-btn:hover {
            background: #00ffcc;
            color: #000;
        }

        .buy-btn:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }

        .buy-btn:disabled:hover {
            background: transparent;
        }

        /* Modal (Pencere) Stilleri */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            border: 2px solid #00ffcc;
            color: white;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #ff003c;
        }

        #inventory-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        #inventory-list li {
            background: #111;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-left: 4px solid #00ffcc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-qty {
            background: #ff003c;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        
        /* --- KESİN SCROLL ÇUBUĞU YOK ETME KODLARI --- */
        /* Sayfadaki tüm elementlerde scrollbar'ı gizler ama kaydırmayı engellemez */
        * {
            -ms-overflow-style: none !important;  /* IE ve Edge için */
            scrollbar-width: none !important;     /* Firefox için */
        }
        *::-webkit-scrollbar {
            display: none !important;             /* Chrome, Safari ve Opera için */
        }
    </style>
</head>
<body id="market-page">
    
    <header class="market-header">
        
        
        
        <div class="market-dashboard">
            <div class="stat-box">
                <span>Balance:</span>
                <strong id="naucoin-balance">99</strong> <small>Naucoin</small>
            </div>
            <div class="stat-box timer-box">
                <span>Refresh:</span>
                <strong id="naucoin-timer">00:00:00</strong>
            </div>
            <button id="inventory-btn">Owned</button>
        </div>
    </header>

    <main>
        <div id="products-grid" class="market-grid">
            </div>
    </main>

    <div id="inventory-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            <h2>Owned</h2>
            <ul id="inventory-list">
                </ul>
        </div>
    </div>
    
    <script>
        // Sabit Değerler
        const DAILY_ALLOWANCE = 99;
        const CYCLE_TIME_MS = 24 * 60 * 60 * 1000; // 24 Saat (Milisaniye)
        
        // 20 Absürt Ürün Listesi
        const products = [
            { id: 1, name: "Absolution Token", price: 1, desc: "For instant regrets. Solved without going to God." },
            { id: 2, name: "Good Deed Multiplier", price: 15, desc: "Turns small good deeds into massive rewards. Like a system exploit, but holy." },
            { id: 3, name: "Sirat Bridge VIP Pass", price: 50, desc: "Skip that massive queue at the Sirat Bridge. Fast-track entry straight ahead." },
            { id: 4, name: "Sin Eraser Sponge", price: 5, desc: "Scrubs away those embarrassing Friday night memories from your Book of Deeds." },
            { id: 5, name: "Intercession Insurance", price: 30, desc: "Plan B. Guarantees a high-ranking saint or prophet to defend you in the worst-case scenario." },
            { id: 6, name: "Scapegoat Bribe", price: 10, desc: "Rents a temporary demon to take the blame for all your bad life choices." },
            { id: 7, name: "Angel Muting Headphones", price: 8, desc: "Instantly blocks out the nagging guilt whispered by the angel on your left shoulder." },
            { id: 8, name: "Fake Holy Glow Spray", price: 3, desc: "Gives your face an instant innocent, pious radiance. Great for first impressions." },
            { id: 9, name: "Divine VAR Glasses", price: 20, desc: "Allows you to review your controversial sins in slow motion and file an appeal." },
            { id: 10, name: "Hellfire Sunscreen", price: 25, desc: "SPF 99999. Maximum protection for a potential 'just passing through' scenario." },
            { id: 11, name: "Book of Deeds Privacy Sleeve", price: 12, desc: "Hides the cover of your Book of Deeds from prying eyes before the final weighing." },
            { id: 12, name: "Heavenly Real Estate Deed", price: 40, desc: "A fake plot of land by the river with a palace view. Legally void, but great for morale." },
            { id: 13, name: "Scale of Justice Calibration Chip", price: 66, desc: "Secretly calibrates the final scale to make your good deeds weigh 200 grams heavier." },
            { id: 14, name: "Karma Trade Voucher", price: 18, desc: "Allows you to trade your personal sins against others for a random stranger's traffic tickets." },
            { id: 15, name: "Temporary Angel Wings", price: 35, desc: "Grants short-term flight capability. Strictly used for skipping long lines at high-end venues." },
            { id: 17, name: "Potion of Last-Minute Regret", price: 45, desc: "Must be consumed exactly 3 seconds before shutting your eyes forever. 50% acceptance rate." },
            { id: 18, name: "Divine Incognito Mode", price: 80, desc: "Suspends your Book of Deeds for 10 minutes. Nothing done during this time is logged." },
            { id: 19, name: "Hell VIP Fast Track", price: 8, desc: "If you are going to burn anyway, at least skip that endless torment queue at the entrance." },
            { id: 20, name: "Relative Muting Amulet", price: 14, desc: "Completely mutes aunts and uncles saying 'We told you so' during the final judgment." }
        ];

        // HTML Elementlerini Seçme
        const balanceEl = document.getElementById('naucoin-balance');
        const timerEl = document.getElementById('naucoin-timer');
        const gridEl = document.getElementById('products-grid');
        const inventoryBtn = document.getElementById('inventory-btn');
        const modal = document.getElementById('inventory-modal');
        const closeModal = document.getElementById('close-modal');
        const inventoryList = document.getElementById('inventory-list');

        // Başlangıç Kurulumu ve Bakiye Kontrolü
        function initMarket() {
            let lastReset = localStorage.getItem('naucoin_lastReset');
            let currentBalance = localStorage.getItem('naucoin_balance');
            let now = new Date().getTime();

            // Eğer ilk defa giriyorsa veya 24 saat geçmişse parayı sıfırla/yenile
            if (!lastReset || (now - parseInt(lastReset)) >= CYCLE_TIME_MS) {
                currentBalance = DAILY_ALLOWANCE;
                localStorage.setItem('naucoin_balance', currentBalance);
                localStorage.setItem('naucoin_lastReset', now);
            }

            updateBalanceDisplay();
            renderProducts();
            startTimer();
        }

        function updateBalanceDisplay() {
            balanceEl.innerText = localStorage.getItem('naucoin_balance');
            checkButtons(); // Paranın yetmediği butonları pasifleştir
        }

        // Ürünleri Ekrana Çizme
        function renderProducts() {
            gridEl.innerHTML = '';
            products.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3 class="product-title">${prod.name}</h3>
                    <p class="product-desc">${prod.desc}</p>
                    <div class="product-price">${prod.price} NC</div>
                    <button class="buy-btn" data-id="${prod.id}" data-price="${prod.price}">BUY</button>
                `;
                gridEl.appendChild(card);
            });

            // Butonlara Tıklama Olayı Ekle
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    buyItem(parseInt(this.getAttribute('data-id')), parseInt(this.getAttribute('data-price')));
                });
            });
        }

        // Satın Alma İşlemi
        function buyItem(id, price) {
            let balance = parseInt(localStorage.getItem('naucoin_balance'));
            
            if (balance >= price) {
                // Parayı düş
                balance -= price;
                localStorage.setItem('naucoin_balance', balance);
                
                // Envantere Ekle
                let inventory = JSON.parse(localStorage.getItem('naucoin_inventory')) || {};
                const product = products.find(p => p.id === id);
                
                if(inventory[product.name]) {
                    inventory[product.name]++;
                } else {
                    inventory[product.name] = 1;
                }
                localStorage.setItem('naucoin_inventory', JSON.stringify(inventory));
                
                updateBalanceDisplay();
                
                // Satın alma efekti için butonu yeşil yap
                const btn = document.querySelector(`.buy-btn[data-id="${id}"]`);
                const oldText = btn.innerText;
                btn.innerText = "Purchased!";
                btn.style.color = "#00ffcc";
                btn.style.borderColor = "#00ffcc";
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.style.color = "";
                    btn.style.borderColor = "";
                }, 1000);

            }
        }

        // Bakiye yetersizse butonları kapat (Disable)
        function checkButtons() {
            let balance = parseInt(localStorage.getItem('naucoin_balance'));
            document.querySelectorAll('.buy-btn').forEach(btn => {
                let price = parseInt(btn.getAttribute('data-price'));
                if (balance < price) {
                    btn.disabled = true;
                    btn.innerText = "Not Enough";
                } else {
                    btn.disabled = false;
                    btn.innerText = "BUY";
                }
            });
        }

        // Geri Sayım Sayacı (Her 1 Saniyede Güncellenir)
        function startTimer() {
            setInterval(() => {
                let lastReset = parseInt(localStorage.getItem('naucoin_lastReset'));
                let now = new Date().getTime();
                let timePassed = now - lastReset;
                let timeLeft = CYCLE_TIME_MS - timePassed;

                if (timeLeft <= 0) {
                    // Süre dolduysa parayı yenilemek için sayfayı yeniden yükle
                    location.reload();
                } else {
                    // Kalan süreyi Saat:Dakika:Saniye formatına çevir
                    let hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    let minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    let seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                    timerEl.innerText = 
                        (hours < 10 ? "0" + hours : hours) + ":" + 
                        (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                        (seconds < 10 ? "0" + seconds : seconds);
                }
            }, 1000);
        }

        // --- MODAL (Sahip Olduklarım Penceresi) İŞLEMLERİ ---
        
        // Pencereyi Aç ve İçini Doldur
        inventoryBtn.addEventListener('click', () => {
            inventoryList.innerHTML = '';
            let inventory = JSON.parse(localStorage.getItem('naucoin_inventory')) || {};
            
            if (Object.keys(inventory).length === 0) {
                inventoryList.innerHTML = '<li>You have no items yet.</li>';
            } else {
                for (let [itemName, qty] of Object.entries(inventory)) {
                    let li = document.createElement('li');
                    li.innerHTML = `<span>${itemName}</span> <span class="item-qty">x${qty}</span>`;
                    inventoryList.appendChild(li);
                }
            }
            modal.classList.remove('hidden');
        });

        // Çarpıya basınca kapat
        closeModal.addEventListener('click', () => {
            modal.classList.add('hidden');
        });

        // Pencere dışına tıklayınca kapat
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.add('hidden');
            }
        });

        // Sayfa yüklendiğinde sistemi başlat
        initMarket();
    </script>
</body>
</html>
