<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atomic Structure</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505; /* Neredeyse tam siyah, derinlik için */
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff; /* Neon mavi/cyan terminal rengi */
            font-size: 14px;
            line-height: 1.5;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
            z-index: 10;
        }
        /* --- YENİ EKLENEN BUTON VE DEPREM TASARIMLARI --- */
        #dangerZone {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 20;
        }
        #nukeBtn {
            background-color: #111;
            color: #ff3333;
            border: 2px solid #ff3333;
            font-size: 32px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
            transition: all 0.2s;
        }
        #nukeBtn:hover {
            background-color: #ff3333;
            color: #111;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.8);
        }
        #nukeBtn:active {
            transform: scale(0.9);
        }
        #warningText {
            color: #ff3333;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }
        #doomsdayMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3333;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            opacity: 0; /* Başlangıçta görünmez */
            pointer-events: none;
            z-index: 30;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.9);
            transition: opacity 0.5s;
            width: 90%;
        }
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-screen {
            animation: shake 0.4s;
            animation-iteration-count: infinite; /* Sonsuza kadar sallar */
        }
    </style>
</head>
<body>
    <div id="hud">
        SYS.STATUS: ATOMIC_STRUCTURE<br>
        CORE: PROTONS & NEUTRONS<br>
        ORBITALS: ELECTRONS ACTIVE
    </div>
    <canvas id="atomCanvas"></canvas>

    <div id="dangerZone">
        <button id="nukeBtn">☢️</button>
        <div id="warningText">DO NOT PRESS</div>
    </div>

    <div id="doomsdayMessage">Why do humans always want to destroy everything?</div>

    <script>
        const canvas = document.getElementById('atomCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- ÇEKİRDEK (NUCLEUS) VERİLERİ ---
        // Merkezdeki proton (kırmızı) ve nötronları (mavi) oluşturuyoruz
        const nucleons = [];
        const nucleonCount = 14; 
        for(let i = 0; i < nucleonCount; i++) {
            nucleons.push({
                x: (Math.random() - 0.5) * 15,
                y: (Math.random() - 0.5) * 15,
                radius: 4 + Math.random() * 2,
                color: i % 2 === 0 ? "#ff3333" : "#3366ff", // Protonlar kırmızı, Nötronlar mavi
                angle: Math.random() * Math.PI * 2,
                speed: 0.02 + Math.random() * 0.03
            });
        }

        // --- ELEKTRON (ELECTRON) YÖRÜNGE VERİLERİ ---
        // 3 farklı açıda eğilmiş eliptik yörüngeler
        const orbits = [
            { rx: 140, ry: 40, rotation: 0,              speed: 0.06, electronAngle: Math.random() * Math.PI * 2 },
            { rx: 140, ry: 40, rotation: Math.PI / 3,    speed: 0.05, electronAngle: Math.random() * Math.PI * 2 }, // 60 derece
            { rx: 140, ry: 40, rotation: -Math.PI / 3,   speed: 0.07, electronAngle: Math.random() * Math.PI * 2 }  // -60 derece
        ];

        function animate() {
            // Ekranı hafif saydam temizleyerek elektronlarda hareket izi (trail) bırakıyoruz
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // 1. ÇEKİRDEĞİ ÇİZ (NUCLEUS - PROTONS & NEUTRONS)
            ctx.save();
            ctx.translate(centerX, centerY);
            
            // Çekirdeğin arkasına parlama efekti
            ctx.beginPath();
            ctx.arc(0, 0, 20, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ffffff";
            ctx.fill();

            // Parçacıkları (Nucleon) çiz ve hafifçe titreştir
            nucleons.forEach(n => {
                n.angle += n.speed;
                // Merkezde küçük bir daire etrafında titreşim hareketi
                const nx = n.x + Math.cos(n.angle) * 2; 
                const ny = n.y + Math.sin(n.angle) * 2;
                
                ctx.beginPath();
                ctx.arc(nx, ny, n.radius, 0, Math.PI * 2);
                ctx.fillStyle = n.color;
                ctx.fill();
            });
            ctx.restore();

            // 2. YÖRÜNGELERİ VE ELEKTRONLARI ÇİZ
            orbits.forEach(orbit => {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(orbit.rotation); // Yörüngeyi kendi açısına göre eğiyoruz

                // Yörünge Çizgisi (Orbit Path)
                ctx.beginPath();
                ctx.ellipse(0, 0, orbit.rx, orbit.ry, 0, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(0, 255, 255, 0.15)";
                ctx.lineWidth = 1;
                ctx.stroke();

                // Elektronun Konumunu Hesapla
                orbit.electronAngle += orbit.speed;
                const ex = Math.cos(orbit.electronAngle) * orbit.rx;
                const ey = Math.sin(orbit.electronAngle) * orbit.ry;

                // Elektron Gövdesi (Electron)
                ctx.beginPath();
                ctx.arc(ex, ey, 4, 0, Math.PI * 2);
                ctx.fillStyle = "#00ffff"; // Neon mavi
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00ffff";
                ctx.fill();

                // Elektron Etiketi (e-)
                ctx.fillStyle = "#ffffff";
                ctx.font = "10px 'Share Tech Mono'";
                ctx.textAlign = "center";
                ctx.shadowBlur = 0; // Yazı net olsun diye parlamayı kapatıyoruz
                ctx.fillText("e-", ex, ey - 8);

                ctx.restore();
            });

            requestAnimationFrame(animate);
            }

            // --- YENİ EKLENEN NÜKLEER BUTON SİSTEMİ ---
            const nukeBtn = document.getElementById('nukeBtn');
            const doomsdayMessage = document.getElementById('doomsdayMessage');

            nukeBtn.addEventListener('pointerdown', () => {
                // 1. Ekranı titret
                document.body.classList.add('shake-screen');
            
                // 2. Mesajı göster
                doomsdayMessage.style.opacity = '1';
            
                // 3. Atomu çıldırt (Elektronları ve çekirdeği aşırı hızlandırıyoruz)
                orbits.forEach(orbit => orbit.speed *= 15);
                nucleons.forEach(n => n.speed *= 15);
            
                // Butonu ve uyarı yazısını gizle ki geri dönüşü olmasın
                document.getElementById('dangerZone').style.display = 'none';
            });

            // Animasyonu başlat
            animate();
    </script>
</body>
</html>
