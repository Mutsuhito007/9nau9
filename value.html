<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #FFD700;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Sayfanın kayması kesin olarak engellendi */
            user-select: none;
        }

        .app-wrapper {
            width: 90%;
            max-width: 360px;
            height: 95%;
            border: 3px solid #FFD700;
            border-radius: 10px;
            background-color: #111;
            padding: 15px; /* 20px'den 15px'e düşürüldü */
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Form Alanı */
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 10px; /* 15px'den 10px'e düşürüldü */
            flex-grow: 1;
            justify-content: center; /* İçeriği dikeyde tam ortalar */
            overflow: hidden; /* Scroll çubuğu iptal edildi */
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 2px; /* 5px'den 2px'e düşürüldü */
        }

        label {
            font-size: 16px; /* 18px'den 16px'e düşürüldü */
            color: #ccc;
        }

        input[type="number"], select {
            background-color: #222;
            border: 2px solid #555;
            color: #FFD700;
            font-family: 'VT323', monospace;
            font-size: 18px; /* 20px'den 18px'e düşürüldü */
            padding: 8px; /* 10px'den 8px'e düşürüldü */
            border-radius: 5px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus, select:focus {
            border-color: #FFD700;
        }

        /* Checkbox (Onay Kutusu) Stilleri */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px; /* 10px'den 8px'e düşürüldü */
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px; /* 18px'den 16px'e düşürüldü */
            color: #FFD700;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #FF3B30; 
            cursor: pointer;
        }

        /* İşlem ve Sonuç Ekranı */
        .processing-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            gap: 20px;
        }

        .loading-text {
            font-size: 20px;
            color: #fff;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .result-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            gap: 15px;
        }

        .price-tag {
            font-size: 46px; /* Biraz küçültüldü */
            color: #4CD964;
            text-shadow: 0 0 15px rgba(76, 217, 100, 0.4);
            background: #222;
            padding: 10px 20px;
            border: 2px solid #4CD964;
            border-radius: 10px;
            width: 100%;
        }

        .receipt-text {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            color: #888;
            line-height: 1.4;
            text-align: left;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            width: 100%;
        }

        .receipt-text .penalty {
            color: #FF3B30; 
        }

        /* Aksiyon Butonu */
        .action-button {
            background-color: #FFD700;
            color: #000;
            font-family: 'VT323', monospace;
            font-size: 22px; /* 24px'den 22px'e düşürüldü */
            border: none;
            padding: 12px; /* 15px'den 12px'e düşürüldü */
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: auto;
            transition: transform 0.1s;
        }
        .action-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="form-container" id="formContainer">
            <div class="input-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="1.2">Male</option>
                    <option value="1.3">Female</option>
                    <option value="1.0">Other</option>
                </select>
            </div>
            <div class="input-group">
                <label>Age (Years)</label>
                <input type="number" id="age" placeholder="e.g. 25" min="1" max="120">
            </div>
            <div class="input-group">
                <label>Height (cm)</label>
                <input type="number" id="height" placeholder="e.g. 175" min="50" max="250">
            </div>
            <div class="input-group">
                <label>Weight (kg)</label>
                <input type="number" id="weight" placeholder="e.g. 70" min="20" max="300">
            </div>

            <div class="checkbox-group">
                <label><input type="checkbox" id="smoker"> I am a smoker (-10%)</label>
                <label><input type="checkbox" id="alcohol"> I drink alcohol (-10%)</label>
            </div>
            
            <button class="action-button" onclick="startCalculation()">APPRAISE ME</button>
        </div>

        <div class="processing-screen" id="processingScreen">
            <h2 style="font-size: 28px;">ANALYZING...</h2>
            <div class="loading-text" id="loadingText">Scanning carbon levels...</div>
        </div>

        <div class="result-screen" id="resultScreen">
            <h3>TOTAL ESTIMATED VALUE</h3>
            <div class="price-tag" id="priceDisplay">$0.00</div>
            <div class="receipt-text" id="receiptDetails">
                </div>
            <button class="action-button" onclick="resetForm()" style="font-size: 20px;">RECALCULATE</button>
        </div>

    </div>

    <script>
        const formContainer = document.getElementById('formContainer');
        const processingScreen = document.getElementById('processingScreen');
        const resultScreen = document.getElementById('resultScreen');
        const loadingText = document.getElementById('loadingText');
        const priceDisplay = document.getElementById('priceDisplay');
        const receiptDetails = document.getElementById('receiptDetails');

        const fakeSteps = [
            "Extracting trace iron from blood...",
            "Evaluating chemical composition...",
            "Calculating carbon footprint...",
            "Checking organ integrity...",
            "Appraising dark web data...",
            "Deducting depreciation for aging cells...",
            "Finalizing biological asset value..."
        ];

        function startCalculation() {
            const genderValue = parseFloat(document.getElementById('gender').value);
            const age = parseInt(document.getElementById('age').value);
            const height = parseInt(document.getElementById('height').value);
            const weight = parseInt(document.getElementById('weight').value);

            if (!age || !height || !weight) {
                alert("Don't hide your stats. Fill all fields!");
                return;
            }

            formContainer.style.display = 'none';
            processingScreen.style.display = 'flex';

            let stepIndex = 0;
            const interval = setInterval(() => {
                loadingText.innerText = fakeSteps[stepIndex];
                stepIndex++;

                if (stepIndex >= fakeSteps.length) {
                    clearInterval(interval);
                    setTimeout(() => showResult(genderValue, age, height, weight), 800);
                }
            }, 1000); 
        }

        function showResult(gender, age, height, weight) {
            const isSmoker = document.getElementById('smoker').checked;
            const isDrinker = document.getElementById('alcohol').checked;

            let baseValue = (weight * 2.8) + (height * 0.9); 
            let ageDepreciation = age * 1.5; 
            let digitalBonus = Math.floor(Math.random() * 50) + 10; 

            let subTotal = (baseValue - ageDepreciation) * gender + digitalBonus;
            
            let receiptHtml = `
                <b>ASSET BREAKDOWN:</b><br>
                + Chemical Raw Material: $${(baseValue).toFixed(2)}<br>
                - Age Depreciation: -$${(ageDepreciation).toFixed(2)}<br>
                + Digital Data Market: $${digitalBonus.toFixed(2)}<br>
            `;

            let totalPenalty = 0;

            if (isSmoker) {
                let smokePenalty = subTotal * 0.10; 
                totalPenalty += smokePenalty;
                receiptHtml += `<span class="penalty">- Lung Damage (Smoking): -$${smokePenalty.toFixed(2)}</span><br>`;
            }

            if (isDrinker) {
                let drinkPenalty = subTotal * 0.10; 
                totalPenalty += drinkPenalty;
                receiptHtml += `<span class="penalty">- Liver Depreciation (Alcohol): -$${drinkPenalty.toFixed(2)}</span><br>`;
            }

            let finalPrice = subTotal - totalPenalty;
            
            if (finalPrice < 15) finalPrice = 14.99; 

            processingScreen.style.display = 'none';
            resultScreen.style.display = 'flex';
            
            priceDisplay.innerText = "$" + finalPrice.toFixed(2);

            receiptHtml += `
                <br>
                <i>Note: This value reflects your elemental and digital market worth. Do not attempt to liquidate yourself.</i>
            `;
            
            receiptDetails.innerHTML = receiptHtml;
        }

        function resetForm() {
            resultScreen.style.display = 'none';
            formContainer.style.display = 'flex';
        }
    </script>
</body>
</html>
